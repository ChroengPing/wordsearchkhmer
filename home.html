<!DOCTYPE html>
<html lang="km" data-bs-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ល្បែងរកពាក្យខ្មែរ · Home</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;500;600;700&family=Kantumruy+Pro:wght@500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />

<style>
/* ---- Home page layout ---- */
.home-header {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.home-header .header-left small {
  color: var(--bs-secondary-color);
  font-family: system-ui, sans-serif;
}

/* ---- Summary strip ---- */
.summary-strip {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 1rem;
  padding: 1rem 1.25rem;
  background: var(--bs-tertiary-bg);
  border: 1px solid var(--bs-border-color);
  border-radius: 20px;
  margin-bottom: 1.75rem;
}
.sum-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 72px;
}
.sum-num   { font-size: 1.5rem; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1.1; }
.sum-label { font-size: .62rem; text-transform: uppercase; letter-spacing: .6px; color: var(--bs-secondary-color); margin-top: 2px; }
.sum-divider { width: 1px; height: 36px; background: var(--bs-border-color); flex-shrink: 0; }

/* ---- Category grid ---- */
.home-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
  gap: 1rem;
  margin-bottom: 2rem;
}

/* ---- Category card ---- */
.cat-card {
  background: var(--bs-tertiary-bg);
  border: 1px solid var(--bs-border-color);
  border-radius: 20px;
  padding: 1.25rem 1rem 1rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .45rem;
  text-align: center;
  transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
  cursor: default;
}
.cat-card:hover {
  transform: translateY(-4px);
  border-color: var(--kh-accent);
  box-shadow: 0 8px 24px rgba(0,0,0,.25);
}
.cat-icon { font-size: 2.6rem; line-height: 1; margin-bottom: .1rem; }
.cat-name { font-family: var(--kh-font); font-size: 1.05rem; font-weight: 700; line-height: 1.2; }
.cat-en   { font-size: .72rem; color: var(--bs-secondary-color); font-family: system-ui, sans-serif; margin-top: -.2rem; }

/* ---- Level dots (one per level, shows stars earned) ---- */
.cat-levels {
  display: flex;
  gap: .3rem;
  margin: .2rem 0 .1rem;
}
.lvl-dot {
  width: 30px;
  height: 26px;
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .55rem;
  line-height: 1;
  border: 1px solid var(--bs-border-color);
  background: var(--bs-body-bg);
}
.lvl-dot.open   { border-style: dashed; opacity: .5; }
.lvl-dot.locked { opacity: .25; font-size: .6rem; }
.lvl-dot.s1 { background: color-mix(in srgb, var(--kh-hint) 25%, transparent); border-color: var(--kh-hint); }
.lvl-dot.s2 { background: color-mix(in srgb, var(--kh-found) 30%, transparent); border-color: var(--kh-found); }
.lvl-dot.s3 { background: color-mix(in srgb, #ffd700 35%, transparent); border-color: #cca800; }

/* ---- Per-category progress bar ---- */
.cat-prog-wrap { width: 100%; }
.cat-prog-track {
  height: 6px;
  background: var(--bs-body-bg);
  border: 1px solid var(--bs-border-color);
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: .3rem;
}
.cat-prog-track div {
  height: 100%;
  background: linear-gradient(90deg, var(--kh-accent-2), var(--kh-found));
  border-radius: 999px;
  transition: width .6s cubic-bezier(.2,.8,.2,1);
}
.cat-prog-label { font-size: .65rem; color: var(--bs-secondary-color); font-variant-numeric: tabular-nums; }

.cat-play-btn {
  width: 100%;
  font-size: .82rem;
  padding: .4rem;
  margin-top: .25rem;
  border-radius: 12px;
}

/* ---- Completed badge on card ---- */
.cat-card.complete { border-color: #cca800; }
.cat-card.complete .cat-icon::after {
  content: " ✓";
  font-size: 1rem;
  color: #cca800;
}

/* ---- Mobile adjustments ---- */
@media (max-width: 575px) {
  .home-grid { grid-template-columns: repeat(2, 1fr); }
  .sum-divider { display: none; }
  .sum-num { font-size: 1.2rem; }
}
</style>
</head>

<body>
<div class="container py-3 py-md-4" style="max-width: 1100px;">

  <!-- ====================== HEADER ====================== -->
  <header class="home-header">
    <div class="header-left">
      <h1 class="brand-title h3 mb-0">
        <span class="brand-accent">ល្បែង</span>រកពាក្យខ្មែរ
      </h1>
      <small>Khmer Word Search · choose a category to start</small>
    </div>
    <div class="d-flex align-items-center gap-2">
      <a href="index-en.html" class="btn btn-outline-secondary icon-btn" title="Play the English version">🇬🇧</a>
      <button id="btnSound" class="btn btn-outline-secondary icon-btn" title="Sound on/off">🔊</button>
      <button id="btnTheme" class="btn btn-outline-secondary icon-btn" title="Toggle light/dark">☀️</button>
      <button id="btnAdmin" class="btn btn-outline-secondary icon-btn" title="Admin login">🔐</button>
    </div>
  </header>

  <!-- ADMIN LOGIN MODAL -->
  <div class="modal fade" id="adminModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content" style="border-radius:18px;">
        <div class="modal-header border-0 pb-1">
          <h6 class="modal-title">🔐 Admin Login</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body pt-1">
          <input type="text" id="adminUser" class="form-control mb-2" placeholder="Username" autocomplete="off">
          <input type="password" id="adminPass" class="form-control mb-3" placeholder="Password">
          <div id="adminError" class="text-danger small mb-2 d-none"></div>
          <button id="btnAdminLogin" class="btn btn-accent w-100">Login</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ====================== SUMMARY STRIP ====================== -->
  <div class="summary-strip">
    <div class="sum-stat">
      <span class="sum-num" id="sumStars">0</span>
      <span class="sum-label">⭐ Stars</span>
    </div>
    <div class="sum-divider"></div>
    <div class="sum-stat">
      <span class="sum-num" id="sumLevels">0/50</span>
      <span class="sum-label">Levels cleared</span>
    </div>
    <div class="sum-divider"></div>
    <div class="sum-stat">
      <span class="sum-num" id="sumCats">0</span>
      <span class="sum-label">Categories done</span>
    </div>
    <div class="ms-auto">
      <button id="btnContinue" class="btn btn-accent px-4">▶ Continue Playing</button>
    </div>
  </div>

  <!-- ====================== CATEGORY GRID ====================== -->
  <div class="home-grid" id="catGrid"></div>

  <!-- ====================== FOOTER ====================== -->
  <footer class="text-center text-secondary small mt-2 pb-3">
    <div style="border-top: 1px solid var(--bs-border-color); padding-top: .7rem;">
      Designed &amp; Developed by
      <strong style="color: var(--bs-body-color);">Chroeng Ping</strong>
      <span class="mx-1" style="opacity:.4;">&amp;</span>
      <strong style="color: var(--bs-body-color);">Nimith</strong>
      <span class="mx-1" style="opacity:.4;">·</span>
      <span style="font-style: italic; opacity: .75;">Curriculum Developer &amp; Educational Content Organizer</span>
    </div>
    <div class="mt-2">
      <button id="btnResetProgress" class="btn btn-sm btn-outline-danger" style="font-size:.7rem;opacity:.4;">
        Reset all progress
      </button>
    </div>
  </footer>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="data-km.js"></script>
<script>
(function() {
  /* ---- Theme ---- */
  const btnTheme = document.getElementById('btnTheme');
  const savedTheme = localStorage.getItem('ws_theme');
  if (savedTheme) {
    document.documentElement.setAttribute('data-bs-theme', savedTheme);
    btnTheme.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
  }
  btnTheme.onclick = () => {
    const isDark = document.documentElement.getAttribute('data-bs-theme') === 'dark';
    const next = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-bs-theme', next);
    btnTheme.textContent = isDark ? '🌙' : '☀️';
    try { localStorage.setItem('ws_theme', next); } catch(e) {}
  };

  /* ---- Sound toggle (preference only — actual audio lives in game) ---- */
  const btnSound = document.getElementById('btnSound');
  const soundOn = localStorage.getItem('ws_sound') !== '0';
  btnSound.textContent = soundOn ? '🔊' : '🔇';
  if (!soundOn) btnSound.classList.add('muted-on');
  btnSound.onclick = () => {
    const nowOn = localStorage.getItem('ws_sound') !== '0';
    const next = !nowOn;
    try { localStorage.setItem('ws_sound', next ? '1' : '0'); } catch(e) {}
    btnSound.textContent = next ? '🔊' : '🔇';
    btnSound.classList.toggle('muted-on', !next);
  };

  /* ---- Admin login ---- */
  const btnAdmin = document.getElementById('btnAdmin');
  let adminOn = sessionStorage.getItem('ws_admin') === '1';

  function applyAdminUI() {
    if (adminOn) {
      btnAdmin.textContent = '👑';
      btnAdmin.title = 'Admin mode — click to logout';
      btnAdmin.classList.remove('btn-outline-secondary');
      btnAdmin.classList.add('btn-warning', 'text-dark');
    } else {
      btnAdmin.textContent = '🔐';
      btnAdmin.title = 'Admin login';
      btnAdmin.classList.add('btn-outline-secondary');
      btnAdmin.classList.remove('btn-warning', 'text-dark');
    }
  }
  applyAdminUI();

  function doAdminLogin() {
    const user   = document.getElementById('adminUser').value.trim();
    const pass   = document.getElementById('adminPass').value;
    const errEl  = document.getElementById('adminError');
    errEl.classList.add('d-none');
    fetch('admin.json')
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(creds => {
        if (user.toLowerCase() === creds.username.toLowerCase() && pass === creds.password) {
          adminOn = true;
          try { sessionStorage.setItem('ws_admin', '1'); } catch(e) {}
          bootstrap.Modal.getInstance(document.getElementById('adminModal'))?.hide();
          applyAdminUI();
        } else {
          errEl.textContent = 'Wrong username or password.';
          errEl.classList.remove('d-none');
        }
      })
      .catch(() => {
        errEl.textContent = 'Could not read admin.json.';
        errEl.classList.remove('d-none');
      });
  }

  btnAdmin.addEventListener('click', () => {
    if (adminOn) {
      adminOn = false;
      try { sessionStorage.removeItem('ws_admin'); } catch(e) {}
      applyAdminUI();
    } else {
      document.getElementById('adminUser').value = '';
      document.getElementById('adminPass').value = '';
      document.getElementById('adminError').classList.add('d-none');
      new bootstrap.Modal(document.getElementById('adminModal')).show();
    }
  });
  document.getElementById('btnAdminLogin').addEventListener('click', doAdminLogin);
  document.getElementById('adminPass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doAdminLogin();
  });

  /* ---- Load progress from localStorage ---- */
  let cleared, starsMap, lastCat;
  try {
    cleared  = new Set(JSON.parse(localStorage.getItem('ws_cleared_km') || '[]'));
    starsMap = JSON.parse(localStorage.getItem('ws_stars_km') || '{}');
    lastCat  = localStorage.getItem('ws_lastCat_km') || null;
  } catch(e) {
    cleared = new Set(); starsMap = {}; lastCat = null;
  }

  /* ---- Summary stats ---- */
  let totalStars = 0, totalLevels = 0, totalCatsDone = 0;
  CATEGORIES.forEach(cat => {
    let catLvlsDone = 0;
    for (let l = 0; l < 5; l++) {
      const k = cat.id + '-' + l;
      if (cleared.has(k)) { catLvlsDone++; totalStars += starsMap[k] || 0; totalLevels++; }
    }
    if (catLvlsDone === 5) totalCatsDone++;
  });
  document.getElementById('sumStars').textContent  = totalStars + '/150';
  document.getElementById('sumLevels').textContent = totalLevels + '/50';
  document.getElementById('sumCats').textContent   = totalCatsDone + '/' + CATEGORIES.length;

  /* ---- Continue button ---- */
  const btnContinue = document.getElementById('btnContinue');
  btnContinue.addEventListener('click', () => {
    if (lastCat) try { sessionStorage.setItem('ws_startCat', lastCat); } catch(e) {}
    window.location.href = 'index.html';
  });

  /* ---- Build category grid ---- */
  const STAR_CHARS = ['', '⭐', '⭐⭐', '⭐⭐⭐'];
  const grid = document.getElementById('catGrid');

  CATEGORIES.forEach(cat => {
    let catLvlsDone = 0, catStarTotal = 0;
    const dots = [];

    for (let l = 0; l < 5; l++) {
      const k = cat.id + '-' + l;
      const prevDone = l === 0 || cleared.has(cat.id + '-' + (l - 1));
      const isDone   = cleared.has(k);
      const s        = starsMap[k] || 0;
      if (isDone) { catLvlsDone++; catStarTotal += s; }
      dots.push({ isDone, locked: !prevDone && !isDone, stars: s });
    }

    const pct      = (catLvlsDone / 5) * 100;
    const allDone  = catLvlsDone === 5;

    const dotsHtml = dots.map((d, i) => {
      let cls = 'lvl-dot';
      let content = '';
      if (d.isDone)       { cls += ' s' + d.stars; content = STAR_CHARS[d.stars] || '⭐'; }
      else if (d.locked)  { cls += ' locked'; content = '🔒'; }
      else                { cls += ' open'; content = (i + 1).toString(); }
      return `<div class="${cls}" title="Level ${i + 1}">${content}</div>`;
    }).join('');

    const card = document.createElement('div');
    card.className = 'cat-card' + (allDone ? ' complete' : '');
    card.innerHTML = `
      <div class="cat-icon">${cat.icon}</div>
      <div class="cat-name">${cat.name}</div>
      <div class="cat-en">${cat.en}</div>
      <div class="cat-levels">${dotsHtml}</div>
      <div class="cat-prog-wrap">
        <div class="cat-prog-track"><div style="width:${pct}%"></div></div>
        <div class="cat-prog-label">${catLvlsDone}/5 levels · ⭐ ${catStarTotal}/15</div>
      </div>
      <button class="btn btn-accent cat-play-btn" data-cat="${cat.id}">▶ លេង · Play</button>
    `;
    grid.appendChild(card);
  });

  /* ---- Play button clicks ---- */
  grid.addEventListener('click', e => {
    const btn = e.target.closest('.cat-play-btn');
    if (!btn) return;
    try { sessionStorage.setItem('ws_startCat', btn.dataset.cat); } catch(e2) {}
    window.location.href = 'index.html';
  });

  /* ---- Reset progress (in footer, subtle) ---- */
  document.getElementById('btnResetProgress').addEventListener('click', () => {
    if (!confirm('Reset ALL progress? This will clear every cleared level and star. This cannot be undone.')) return;
    try {
      localStorage.removeItem('ws_cleared_km');
      localStorage.removeItem('ws_stars_km');
      localStorage.removeItem('ws_lastCat_km');
      localStorage.removeItem('ws_cleared_en');
      localStorage.removeItem('ws_stars_en');
      localStorage.removeItem('ws_lastCat_en');
    } catch(e) {}
    window.location.reload();
  });
})();
</script>
</body>
</html>
